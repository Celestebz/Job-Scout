name: Daily Job Scout

# 触发条件
on:
  # 定时执行：UTC 01:00 = 北京时间 09:00
  schedule:
    - cron: '0 1 * * *'

  # 支持手动触发
  workflow_dispatch:

# 环境变量
env:
  CLAUDE_VERSION: "latest"
  USER_ID: "wangbaozhen"

jobs:
  job-scout-daily:
    name: Execute Daily Job Scout
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 最大运行时间60分钟

    # 权限配置
    permissions:
      contents: write  # 需要写入权限来提交结果

    steps:
      # Step 1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 获取完整历史，用于智能去重

      # Step 2: 安装Claude Code CLI
      - name: Setup Claude Code CLI
        run: |
          echo "🔧 Installing Claude Code CLI..."
          curl -fsSL https://claude.ai/install.sh | sh
          echo "$HOME/.claude/bin" >> $GITHUB_PATH

          # 验证安装
          claude --version || {
            echo "❌ Claude Code CLI installation failed"
            exit 1
          }
          echo "✅ Claude Code CLI installed successfully"

      # Step 3: 设置Python环境（用于生成XLSX）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Step 4: 安装Python依赖
      - name: Install Python dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          pip install openpyxl pandas

      # Step 5: 创建必要的目录
      - name: Create directories
        run: |
          echo "📁 Creating directories..."
          mkdir -p logs
          mkdir -p result
          mkdir -p backup

          # 设置时区为北京时间
          sudo timedatectl set-timezone Asia/Shanghai
          echo "⏰ Timezone set to Asia/Shanghai"

      # Step 6: 显示运行信息
      - name: Display execution info
        run: |
          echo "=========================================="
          echo "📊 Job Scout Scheduled Execution"
          echo "=========================================="
          echo "📅 Date: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "👤 User ID: ${{ env.USER_ID }}"
          echo "🌏 Timezone: Asia/Shanghai (UTC+8)"
          echo "🔗 Workflow: ${{ github.workflow }}"
          echo "🏃 Run Number: ${{ github.run_number }}"
          echo "=========================================="

      # Step 7: 执行Job Scout技能
      - name: Run Job Scout skill
        id: job_scout
        run: |
          echo "🚀 Starting Job Scout execution..."
          echo ""

          # 记录开始时间
          START_TIME=$(date +%s)

          # 执行Job Scout（带超时保护）
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          LOG_FILE="logs/daily-run-${TIMESTAMP}.log"

          echo "📝 Log file: $LOG_FILE"
          echo ""

          # 执行Job Scout
          if timeout 2700 claude /job-scout "帮我找工作" > "$LOG_FILE" 2>&1; then
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))

            echo ""
            echo "✅ Job Scout completed successfully"
            echo "⏱️ Duration: ${DURATION}s ($(($DURATION / 60))m $(($DURATION % 60))s)"

            # 提取关键信息到摘要
            echo "## Job Scout执行结果" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **状态**: ✅ 成功" >> $GITHUB_STEP_SUMMARY
            echo "- **执行时间**: ${DURATION秒}" >> $GITHUB_STEP_SUMMARY
            echo "- **日志文件**: \`$LOG_FILE\`" >> $GITHUB_STEP_SUMMARY

            # 提取关键指标
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📊 关键指标" >> $GITHUB_STEP_SUMMARY
            grep -E "(新发现岗位|平均匹配度|优先级分布|报告已生成)" "$LOG_FILE" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "无法提取指标"

            # 创建简短摘要
            cat > logs/last-run-summary.txt << EOF
          Job Scout执行摘要
          ================
          时间: $(date '+%Y-%m-%d %H:%M:%S')
          状态: ✅ 成功
          耗时: ${DURATION秒}

          关键指标:
          $(grep -E "(新发现岗位|平均匹配度|优先级分布)" "$LOG_FILE" 2>/dev/null || echo "无")
          EOF

          else
            EXIT_CODE=$?
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))

            echo ""
            if [ $EXIT_CODE -eq 124 ]; then
              echo "❌ Job Scout timed out after 45 minutes"
              echo "## ⏰ 执行超时" >> $GITHUB_STEP_SUMMARY
              echo "Job Scout执行超过45分钟，已自动终止" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Job Scout failed with exit code $EXIT_CODE"
              echo "## ❌ 执行失败" >> $GITHUB_STEP_SUMMARY
              echo "退出码: $EXIT_CODE" >> $GITHUB_STEP_SUMMARY
            fi

            # 显示最后50行日志
            echo ""
            echo "📋 Last 50 lines of log:"
            echo "=========================================="
            tail -50 "$LOG_FILE"
            echo "=========================================="

            exit $EXIT_CODE
          fi
        continue-on-error: false

      # Step 8: 备份job_history.json
      - name: Backup job history
        if: always()
        run: |
          if [ -f "job_history.json" ]; then
            BACKUP_FILE="backup/job_history_$(date +%Y%m%d_%H%M%S).json"
            cp job_history.json "$BACKUP_FILE"
            echo "💾 Backup created: $BACKUP_FILE"

            # 只保留最近30天的备份
            find backup/ -name "job_history_*.json" -mtime +30 -delete
          fi

      # Step 9: 提交结果到Git仓库
      - name: Commit results to repository
        if: success()
        run: |
          echo "📤 Committing results to repository..."

          # 配置Git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 添加job_history.json（必须，用于去重）
          git add job_history.json

          # 添加最新的XLSX报告
          if ls result/*.xlsx 1> /dev/null 2>&1; then
            git add result/*.xlsx

            # 清理超过30天的旧报告（保留仓库大小）
            find result/ -name "*.xlsx" -mtime +30 -delete
          fi

          # 添加执行摘要
          if [ -f "logs/last-run-summary.txt" ]; then
            git add logs/last-run-summary.txt
          fi

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            # 提交变更
            git commit -m "🤖 Automated daily job scout run

            - Run: #${{ github.run_number }}
            - Date: $(date '+%Y-%m-%d %H:%M:%S')
            - User: ${{ env.USER_ID }}
            [skip ci]"

            # 推送到GitHub
            git push

            echo "✅ Results committed and pushed to repository"
          fi

      # Step 10: 上传完整日志到Artifacts
      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-scout-logs-${{ github.run_number }}
          path: |
            logs/*.log
            logs/last-run-summary.txt
            result/*.xlsx
          retention-days: 30  # 保存30天
          if-no-files-found: warn

      # Step 11: 在GitHub页面显示执行摘要
      - name: Generate final summary
        if: always()
        run: |
          echo "### 📦 生成的文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 显示XLSX报告
          if ls result/*.xlsx 1> /dev/null 2>&1; then
            echo "#### 📊 XLSX报告" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh result/*.xlsx >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # 显示数据库统计
          if [ -f "job_history.json" ]; then
            TOTAL_JOBS=$(jq '.total_jobs // 0' job_history.json)
            LAST_UPDATE=$(jq -r '.last_updated // "unknown"' job_history.json)

            echo "#### 🗄️ 数据库状态" >> $GITHUB_STEP_SUMMARY
            echo "- 总岗位数: $TOTAL_JOBS" >> $GITHUB_STEP_SUMMARY
            echo "- 最后更新: $LAST_UPDATE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # 显示日志位置
          echo "#### 📝 日志文件" >> $GITHUB_STEP_SUMMARY
          echo "- 完整日志: 在Artifacts中下载" >> $GITHUB_STEP_SUMMARY
          echo "- 保留期: 30天" >> $GITHUB_STEP_SUMMARY

      # Step 12: 失败时发送通知（可选）
      - name: Notification on failure
        if: failure()
        run: |
          echo "❌ Job Scout execution failed!"
          echo "📧 Please check the logs for details"
          echo ""
          echo "## ⚠️ 执行失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请查看上方的日志输出，或从Artifacts下载完整日志。" >> $GITHUB_STEP_SUMMARY

          # TODO: 这里可以添加企业微信/钉钉/邮件通知
          # curl -X POST ${{ secrets.WEBHOOK_URL }} -d '...'
