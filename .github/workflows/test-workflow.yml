name: Test Workflow

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test echo
        run: |
          echo "Test workflow is working!"
          date
          pwd
          ls -la

      - name: Create directories
        run: |
          mkdir -p logs result backup
          ls -la logs result backup
